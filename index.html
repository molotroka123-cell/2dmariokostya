<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kostya Runs</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game">
        <!-- Original game code goes here -->
        <!-- For demonstration, here's sample placeholders -->
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="scoreDisplay">Score: <span id="score">0</span></div>
        <button id="submitScore">Submit Score</button>
    </div>
    <div id="leaderboardModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Leaderboard</h2>
            <ol id="leaderboard"></ol>
        </div>
    </div>
    <script>
        // Original game logic here

        // Score tracking
        let score = 0;

        // LocalStorage for leaderboard
        function saveScore(username, score) {
            let leaderboard = JSON.parse(localStorage.getItem('leaderboard')) || [];
            leaderboard.push({username, score});
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard = leaderboard.slice(0, 10);
            localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
            displayLeaderboard();
        }

        function displayLeaderboard() {
            const leaderboard = JSON.parse(localStorage.getItem('leaderboard')) || [];
            const leaderboardElement = document.getElementById('leaderboard');
            leaderboardElement.innerHTML = '';
            leaderboard.forEach(entry => {
                const li = document.createElement('li');
                li.textContent = `${entry.username}: ${entry.score}`;
                leaderboardElement.appendChild(li);
            });
        }

        document.getElementById('submitScore').addEventListener('click', () => {
            const username = prompt('Enter your name:');
            if (username) {
                saveScore(username, score);
            }
        });

        // Logic to open and close the leaderboard modal

        // Event listeners to handle modal display
    </script>
</body>
</html>
