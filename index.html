<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Leaderboard</title>
    <style>
        body { font-family: Arial, sans-serif; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Online Leaderboard</h1>
    <h2>Player Registration</h2>
    <form id="registrationForm">
        <input type="text" id="playerName" placeholder="Enter player name" required>
        <button type="submit">Register</button>
    </form>
    <h2>Leaderboard</h2>
    <table id="leaderboard">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Player</th>
                <th>Score</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    <script>
        const leaderboard = [];
        const registrationForm = document.getElementById('registrationForm');
        const leaderboardTableBody = document.getElementById('leaderboard').getElementsByTagName('tbody')[0];

        registrationForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const playerName = document.getElementById('playerName').value;
            const playerScore = Math.floor(Math.random() * 100); // Simulated score
            leaderboard.push({name: playerName, score: playerScore});
            updateLeaderboard();
        });

        function updateLeaderboard() {
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboardTableBody.innerHTML = ''; // Clear previous data
            leaderboard.forEach((player, index) => {
                const row = leaderboardTableBody.insertRow();
                row.insertCell(0).textContent = index + 1;
                row.insertCell(1).textContent = player.name;
                row.insertCell(2).textContent = player.score;
            });
        }
    </script>
</body>
</html>
